<div class="flex flex-col items-center justify-center min-h-[85vh] px-4 text-center select-none">
  <!-- Interactive Floating Graphics/Illustration -->
  <div class="relative w-72 h-72 mb-8 flex items-center justify-center">
    <!-- Outer animated ring -->
    <div class="absolute inset-0 rounded-full border-4 border-dashed border-indigo-200 animate-spin" style="animation-duration: 15s;"></div>
    <!-- Inner glowing circle -->
    <div class="absolute w-56 h-56 rounded-full bg-indigo-50/50 blur-xl animate-pulse"></div>
    
    <!-- Big 404 text with gradient -->
    <div class="relative text-8xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-indigo-650 via-indigo-500 to-indigo-400 drop-shadow-sm select-text">
      404
    </div>
  </div>

  <!-- Content & Explanation -->
  <h1 class="text-3xl font-extrabold text-[var(--text-primary)] tracking-tight mb-3">
    Page Not Found
  </h1>
  <p class="text-sm text-[var(--text-secondary)] max-w-md mb-8 leading-relaxed">
    The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.
  </p>

  <!-- Navigation Action Buttons -->
  <div class="flex flex-col sm:flex-row gap-3">
    <button class="app-btn-primary py-3 px-6 text-sm cursor-pointer shadow-md shadow-indigo-500/25" (click)="goBack()">
      Return Home
    </button>
  </div>
</div>
