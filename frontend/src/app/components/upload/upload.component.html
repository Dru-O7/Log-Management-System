<div class="mt-4 max-w-[600px] mx-auto px-4">
  <div class="app-card">
    <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-6">Submit Document</h2>
    
    <div class="mb-5">
      <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Select File (PDF, DOCX)</label>
      <input type="file" class="app-input file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-655/10 file:text-[var(--primary)] hover:file:bg-indigo-655/20 file:cursor-pointer" (change)="onFileSelected($event)" accept=".pdf,.docx">
    </div>

    <div class="mb-5">
      <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Document Title</label>
      <input type="text" class="app-input" [(ngModel)]="title" placeholder="e.g. Science Project Report">
    </div>

    <div class="mb-5">
      <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Description / Purpose</label>
      <textarea class="app-input" rows="3" [(ngModel)]="description" placeholder="Describe the purpose of this document (e.g. Term-end project submission for Physics class)..."></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-5">
      <div>
        <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Category</label>
        <select class="app-input cursor-pointer" [(ngModel)]="category">
          <option *ngFor="let dt of documentTypes" [value]="dt.Name" class="bg-white text-slate-800">{{ dt.Name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Tags (comma separated)</label>
        <input type="text" class="app-input" [(ngModel)]="tags" placeholder="e.g. urgent, class-10, term-2">
      </div>
    </div>

    <!-- Alert for Parent co-signing -->
    <div *ngIf="needsParentCosign()" class="mb-5 p-4 bg-amber-50 border border-amber-200 rounded-[var(--radius-md)] flex items-start gap-3">
      <div class="text-amber-600 mt-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
          <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
        </svg>
      </div>
      <div>
        <div class="text-xs font-bold text-amber-800 uppercase tracking-wider">Parent Co-signing Required</div>
        <p class="text-xs text-amber-700 mt-1 leading-relaxed">This document will be routed to your Parent first for mandatory approval before it reaches your Class Teacher.</p>
      </div>
    </div>

    <div class="mb-6" *ngIf="!needsParentCosign()">
      <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Submit To (Teacher / Principal)</label>
      <select class="app-input cursor-pointer" [(ngModel)]="targetOwnerId">
        <option *ngFor="let user of users" [value]="user.id || user.ID" class="bg-white text-slate-800">{{ user.name || user.Name }} ({{ user.email || user.Email }})</option>
      </select>
    </div>

    <div *ngIf="error" class="text-rose-600 mb-5 text-sm p-3 bg-rose-50 border border-rose-100 rounded-xl">{{ error }}</div>

    <div class="flex gap-4 mt-6">
      <button class="app-btn-primary cursor-pointer flex-1 sm:flex-initial" (click)="upload()">Upload & Submit</button>
      <button class="app-btn-secondary cursor-pointer flex-1 sm:flex-initial" (click)="cancel()">Cancel</button>
    </div>
  </div>
</div>
