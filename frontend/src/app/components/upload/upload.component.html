<div class="mt-4 max-w-[600px] mx-auto px-4">
  <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-8 shadow-xl">
    <h2 class="text-2xl font-bold text-slate-100 mb-6">Upload Document</h2>
    
    <div class="mb-5">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Select File (PDF, DOCX)</label>
      <input type="file" class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-600/10 file:text-blue-400 hover:file:bg-blue-600/20 file:cursor-pointer" (change)="onFileSelected($event)" accept=".pdf,.docx">
    </div>

    <div class="mb-6">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Select Initial Approver</label>
      <select class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300 cursor-pointer" [(ngModel)]="targetOwnerId">
        <option *ngFor="let user of users" [value]="user.ID" class="bg-slate-900">{{ user.Name }} ({{ user.Email }})</option>
      </select>
    </div>

    <div *ngIf="error" class="text-rose-400 mb-5 text-sm p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl">
      {{ error }}
    </div>

    <div class="flex gap-4 mt-6">
      <button class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 px-5 rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 cursor-pointer" (click)="upload()">Upload & Submit</button>
      <button class="text-slate-300 hover:text-white border border-slate-700 hover:bg-slate-800 font-medium py-2.5 px-5 rounded-xl transition-all duration-300 cursor-pointer" (click)="cancel()">Cancel</button>
    </div>
  </div>
</div>
