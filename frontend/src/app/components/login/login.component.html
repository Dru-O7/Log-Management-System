<div class="min-h-screen flex flex-col md:flex-row bg-[var(--background)] font-sans">
  
  <!-- Left Side: MoE Banner & Portal Branding (Hidden on mobile) -->
  <div class="hidden md:flex md:w-[50%] lg:w-[55%] bg-[var(--primary)] text-white flex-col justify-between p-8 relative flex-shrink-0">
    
    <!-- Top White Branding Banner Image -->
    <div class="w-full max-w-lg mx-auto relative z-10 transition-all">
      <img src="https://demosamarthx.du.ac.in/assets/img/authentication/samarthx_banner.png" alt="Branding Banner" class="w-full h-auto object-contain rounded-lg shadow-xs">
    </div>

    <!-- Middle Portal Heading -->
    <div class="my-auto text-center relative z-10">
      <h1 class="text-2xl lg:text-3xl font-extrabold tracking-wide uppercase text-white drop-shadow-sm">
        Document Management Portal
      </h1>
      <p class="text-blue-100/90 text-xs mt-2.5 max-w-md mx-auto font-medium leading-relaxed">
        A secure and centralized repository for school documents, academic records, logs, and workflow approval management.
      </p>
    </div>

    <!-- Spacing div at bottom -->
    <div class="h-10"></div>
  </div>

  <!-- Right Side: Login Form -->
  <div class="flex-1 flex flex-col justify-center items-center p-6 sm:p-12 md:p-16 bg-[var(--surface)] relative">
    <div class="w-full max-w-[400px] space-y-6">
      
      <!-- Brand Logo Header -->
      <div class="text-center">
        <img src="https://samarthx.du.ac.in/user/images/g5_hydrogen/samxw-removebg-preview.png" alt="SamarthX Logo" class="h-16 w-auto object-contain mx-auto mb-2">
        <p class="text-[10px] text-[var(--text-secondary)] font-bold uppercase tracking-wider">Sign in to access your dashboard</p>
      </div>

      <!-- Main Login Form -->
      <form (submit)="login()" class="space-y-4">
        
        <!-- Email Input -->
        <div class="space-y-1.5">
          <label for="login-email" class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Email or Phone</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </div>
            <input id="login-email" 
                   type="email" 
                   class="app-input pl-10 pr-3" 
                   [(ngModel)]="email" 
                   name="email" 
                   placeholder="Enter your Email or Phone" 
                   required>
          </div>
          <div class="flex items-center gap-1 text-[9px] text-[var(--text-muted)] mt-1">
            <svg class="h-3.5 w-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>Enter your registered email address or phone number</span>
          </div>
        </div>

        <!-- Password Input -->
        <div class="space-y-1.5">
          <label for="login-password" class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input id="login-password" 
                   type="password" 
                   class="app-input pl-10 pr-3" 
                   [(ngModel)]="password" 
                   name="password" 
                   placeholder="••••••••" 
                   required>
          </div>
        </div>
        
        <!-- Error Alerts -->
        <div *ngIf="error" class="text-rose-600 text-xs p-3 bg-rose-50 dark:bg-rose-950/40 border border-rose-100 dark:border-rose-900/30 rounded-lg">
          {{ error }}
        </div>
        
        <!-- Submit Button -->
        <button type="submit" 
                class="w-full app-btn-primary py-2.5 cursor-pointer shadow-sm hover:shadow-md active:scale-98 transition-all rounded-md text-xs font-semibold" 
                [disabled]="loading">
          <span *ngIf="!loading">Continue</span>
          <span *ngIf="loading">Signing In...</span>
        </button>
      </form>
      
      <!-- Footer signup trigger link -->
      <p class="text-center text-xs text-[var(--text-secondary)] pt-4">
        Don’t have a login account? 
        <a routerLink="/register" class="text-[var(--primary)] hover:underline font-bold">Create login account here</a>
      </p>

    </div>
  </div>

</div>
