<div class="mt-4 max-w-5xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-slate-100">Dashboard</h2>
    <button class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 px-5 rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 flex items-center gap-2 cursor-pointer" (click)="goToUpload()">
      <span class="text-lg leading-none">+</span> Upload New Document
    </button>
  </div>

  <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-6 shadow-xl">
    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-6">My Documents</h3>
    
    <div *ngIf="documents.length === 0" class="text-center py-12 text-slate-400">
      No documents found. Upload one to get started!
    </div>

    <div class="space-y-3">
      <div *ngFor="let doc of documents" class="p-4 bg-slate-950/40 hover:bg-slate-950/80 border border-slate-800/60 hover:border-slate-700/80 rounded-xl flex justify-between items-center transition-all duration-300 cursor-pointer shadow-sm hover:shadow-md" (click)="goToDetails(doc.ID)">
        <div>
          <div class="font-medium text-slate-100 text-base mb-1.5">{{ doc.Filename }}</div>
          <div class="text-xs text-slate-400 flex flex-wrap gap-x-4 gap-y-1">
            <span>Uploader: <strong class="text-slate-300 font-medium">{{ doc.Uploader.Name }}</strong></span>
            <span>Current Owner: <strong class="text-slate-300 font-medium">{{ doc.CurrentOwner.Name }}</strong></span>
            <span>Date: {{ doc.CreatedAt | date:'short' }}</span>
          </div>
        </div>
        <div>
          <span class="px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider border" [ngClass]="{
            'bg-amber-500/10 text-amber-500 border-amber-500/20': doc.Status === 'Pending Approval' || doc.Status === 'Draft' || doc.Status === 'Sent Back',
            'bg-emerald-500/10 text-emerald-500 border-emerald-500/20': doc.Status === 'Approved',
            'bg-rose-500/10 text-rose-500 border-rose-500/20': doc.Status === 'Rejected'
          }">{{ doc.Status }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
